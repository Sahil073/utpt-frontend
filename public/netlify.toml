[build]
  publish = "."

# Proxy all /api/* calls to your deployed backend.
# Replace YOUR_BACKEND_URL with your actual backend URL (e.g. https://utpt-api.onrender.com)
[[redirects]]
  from = "/api/*"
  to   = "https://utpt-backend.onrender.com/api/:splat"
  status  = 200
  force   = true

# SPA-style fallback — serve index.html for any unmatched route
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security & caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection       = "1; mode=block"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
