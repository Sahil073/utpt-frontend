<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTPT – Admin Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<div id="page-loader">
  <div class="loader-logo">
    <div class="loader-icon">U</div>
    <div>
      <div class="loader-text"><span>U</span><span>T</span><span>P</span><span>T</span></div>
      <div class="loader-sub">Admin Panel</div>
    </div>
  </div>
  <div class="loader-flower">
    <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
  </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
<button class="mobile-menu-btn" id="menuBtn" aria-label="Menu"><span></span><span></span><span></span></button>

<div class="app-shell">
  <nav class="sidebar" id="sidebar">
    <a class="sidebar-logo" href="/admin.html">
      <div class="sidebar-logo-icon">U</div>
      <div class="sidebar-logo-text">
        <div class="sidebar-logo-name">UTPT</div>
        <div class="sidebar-logo-sub">Admin</div>
      </div>
    </a>
    <div class="sidebar-nav">
      <a href="/admin.html" class="nav-item">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg></span>
        Dashboard
      </a>
      <a href="/admin-profile.html" class="nav-item active">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></span>
        My Profile
      </a>
      <a href="/leaderboard.html" class="nav-item">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6l4-4 4 4"/><path d="M12 2v10.3"/><path d="M4 13.5A7 7 0 0 0 12 20a7 7 0 0 0 8-6.5"/><path d="M5 17l-1 4h16l-1-4"/></svg></span>
        Leaderboard
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="sidebarAvatar">A</div>
        <div class="sidebar-user-info">
          <span class="nav-user-name" id="navUserName">Loading…</span>
          <span class="nav-user-role">Admin</span>
        </div>
      </div>
      <button id="logoutBtn" class="btn btn-ghost btn-sm w-full">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header fade-up">
      <div>
        <h1>Admin Profile</h1>
        <p class="page-header-sub">Manage your account details</p>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;max-width:820px;align-items:start;">
      <!-- Profile Info -->
      <div class="card fade-up" style="animation-delay:.05s">
        <div class="card-title"><span class="card-title-accent"></span>Account Details</div>
        <div id="profileInfo">
          <div class="loading-row" style="padding:2rem;"><div class="spinner"></div> Loading…</div>
        </div>
      </div>

      <!-- Change Password -->
      <div class="card fade-up" style="animation-delay:.1s">
        <div class="card-title"><span class="card-title-accent"></span>Change Password</div>
        <form id="changePwdForm">
          <div class="form-group">
            <label>Current Password</label>
            <input type="password" id="currentPwd" class="input" required>
          </div>
          <div class="form-group">
            <label>New Password</label>
            <input type="password" id="newPwd" class="input" placeholder="Min 8 characters" required>
          </div>
          <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" id="confirmPwd" class="input" required>
          </div>
          <button type="submit" id="savePwdBtn" class="btn btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Update Password
          </button>
        </form>
      </div>
    </div>
  </main>
</div>

<script>
window.addEventListener('load', () => { setTimeout(() => { const l=document.getElementById('page-loader'); if(l) l.classList.add('hide'); }, 700); });
const menuBtn=document.getElementById('menuBtn'),sidebar=document.getElementById('sidebar'),overlay=document.getElementById('sidebarOverlay');
function toggleSidebar(){sidebar.classList.toggle('open');overlay.classList.toggle('show');}
menuBtn?.addEventListener('click',toggleSidebar);overlay?.addEventListener('click',toggleSidebar);
</script>
<script type="module">
  import { requireAuth, logout } from "/js/auth.js";
  import { students } from "/js/api.js";
  import { toast, setLoading } from "/js/utils.js";

  const user = await requireAuth(["admin"]);
  if (!user) throw new Error("Not authenticated");

  const navUserName = document.getElementById('navUserName');
  const sidebarAvatar = document.getElementById('sidebarAvatar');
  if (navUserName) navUserName.textContent = user.name;
  if (sidebarAvatar) sidebarAvatar.textContent = (user.name||'A')[0].toUpperCase();
  document.getElementById("logoutBtn").addEventListener("click", logout);

  try {
    const res = await students.me();
    const p = res.data;
    document.getElementById("profileInfo").innerHTML = `
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.25rem;">
        <div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.375rem;">${(p.name||'A')[0].toUpperCase()}</div>
        <div>
          <div style="font-weight:800;font-size:1.05rem;">${p.name}</div>
          <span class="badge badge-purple">${p.role}</span>
        </div>
      </div>
      <div class="info-row"><span class="label">College ID</span><span class="value">${p.college_id}</span></div>
      <div class="info-row"><span class="label">Email</span><span class="value" style="font-size:.8125rem;">${p.email}</span></div>
      <div class="info-row"><span class="label">Role</span><span class="value" style="color:var(--primary);">${p.role}</span></div>`;
  } catch (err) { document.getElementById("profileInfo").innerHTML = `<p style="color:var(--danger);font-size:.875rem;">Failed to load profile</p>`; }

  document.getElementById("changePwdForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const cur = document.getElementById("currentPwd").value;
    const nw = document.getElementById("newPwd").value;
    const conf = document.getElementById("confirmPwd").value;
    if (nw !== conf) { toast("Passwords do not match", "warning"); return; }
    if (nw.length < 8) { toast("Min 8 characters", "warning"); return; }
    const btn = document.getElementById("savePwdBtn");
    setLoading(btn, true);
    try {
      await students.changePassword({ currentPassword: cur, newPassword: nw });
      toast("Password changed!", "success");
      e.target.reset();
    } catch (err) { toast(err.message || "Failed", "error"); }
    finally { setLoading(btn, false); }
  });
</script>
</body>
</html>
