<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTPT Admin – My Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<div id="page-loader">
  <div class="loader-logo"><div class="loader-icon">U</div><div><div class="loader-text"><span>U</span><span>T</span><span>P</span><span>T</span></div><div class="loader-sub">Admin Panel</div></div></div>
  <div class="loader-flower"><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div></div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
<button class="mobile-menu-btn" id="menuBtn" aria-label="Menu"><span></span><span></span><span></span></button>

<div class="app-shell">
  <nav class="sidebar" id="sidebar">
    <a class="sidebar-logo" href="/admin-dashboard.html"><div class="sidebar-logo-icon">U</div><div class="sidebar-logo-text"><div class="sidebar-logo-name">UTPT</div><div class="sidebar-logo-sub">Admin</div></div></a>
    <div class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="/admin-dashboard.html" class="nav-item"><span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg></span>Dashboard</a>
      <div class="nav-section-label">Content</div>
      <a href="/admin-resources.html" class="nav-item"><span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>Resources</a>
      <a href="/admin-questions.html" class="nav-item"><span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>Questions</a>
      <a href="/admin-leaderboard.html" class="nav-item"><span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6l4-4 4 4"/><path d="M12 2v10.3"/><path d="M4 13.5A7 7 0 0 0 12 20a7 7 0 0 0 8-6.5"/><path d="M5 17l-1 4h16l-1-4"/></svg></span>Leaderboard</a>
      <a href="/admin-profile.html" class="nav-item active"><span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></span>My Profile</a>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user"><div class="sidebar-user-avatar" id="sidebarAvatar">A</div><div class="sidebar-user-info"><span class="nav-user-name" id="navUserName">Loading…</span><span class="nav-user-role">Admin</span></div></div>
      <button id="logoutBtn" class="btn btn-ghost btn-sm w-full"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header fade-up"><div><h1>My Profile</h1><p class="page-header-sub">Admin account information</p></div></div>
    <div style="max-width:520px;display:flex;flex-direction:column;gap:1.25rem;">
      <div class="card fade-up">
        <div class="card-title"><span class="card-title-accent"></span>Account Info</div>
        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;">
          <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.5rem;" id="avatarInitials">A</div>
          <div>
            <div style="font-weight:800;font-size:1.05rem;color:var(--text);" id="profileName">Loading…</div>
            <div><span class="badge badge-purple" style="margin-top:.25rem;">Admin</span></div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:.5rem;font-size:.8375rem;">
          <div style="display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--border-solid);"><span style="color:var(--muted);">College ID</span><span style="font-weight:600;" id="profileCollegeId">—</span></div>
          <div style="display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--border-solid);"><span style="color:var(--muted);">Email</span><span style="font-weight:600;" id="profileEmail">—</span></div>
          <div style="display:flex;justify-content:space-between;padding:.5rem 0;"><span style="color:var(--muted);">Role</span><span style="font-weight:600;">Administrator</span></div>
        </div>
      </div>

      <div class="card fade-up" style="animation-delay:.05s">
        <div class="card-title"><span class="card-title-accent"></span>Change Password</div>
        <form id="changePwdForm">
          <div class="form-group"><label>Current Password</label><input type="password" id="currentPwd" class="input"></div>
          <div class="form-group"><label>New Password</label><input type="password" id="newPwd" class="input" placeholder="Minimum 8 characters"></div>
          <div class="form-group"><label>Confirm New Password</label><input type="password" id="confirmPwd" class="input"></div>
          <button type="submit" id="savePwdBtn" class="btn btn-primary"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Update Password</button>
        </form>
      </div>
    </div>
  </main>
</div>

<script>
window.addEventListener('load', () => { setTimeout(() => { const l=document.getElementById('page-loader'); if(l) l.classList.add('hide'); }, 700); });
const menuBtn=document.getElementById('menuBtn'),sidebar=document.getElementById('sidebar'),overlay=document.getElementById('sidebarOverlay');
function toggleSidebar(){sidebar.classList.toggle('open');overlay.classList.toggle('show');}
menuBtn?.addEventListener('click',toggleSidebar);overlay?.addEventListener('click',toggleSidebar);
</script>
<script type="module">
import { students } from "/js/api.js";
import { requireAuth, logout } from "/js/auth.js";
import { toast, setLoading } from "/js/utils.js";

const user = await requireAuth(["admin"]);
if (!user) throw new Error("Not authenticated");

document.getElementById('navUserName').textContent = user.name;
document.getElementById('sidebarAvatar').textContent = (user.name||'A')[0].toUpperCase();
document.getElementById('logoutBtn').addEventListener('click', logout);

document.getElementById('profileName').textContent = user.name || '—';
document.getElementById('profileCollegeId').textContent = user.college_id || user.collegeId || '—';
document.getElementById('profileEmail').textContent = user.email || '—';
document.getElementById('avatarInitials').textContent = (user.name||'A')[0].toUpperCase();

document.getElementById('changePwdForm').addEventListener('submit', async e => {
  e.preventDefault();
  const cur = document.getElementById('currentPwd').value;
  const nw = document.getElementById('newPwd').value;
  const conf = document.getElementById('confirmPwd').value;
  if (nw !== conf) { toast('Passwords do not match', 'warning'); return; }
  if ((nw||'').length < 8) { toast('Password must be at least 8 characters', 'warning'); return; }
  const btn = document.getElementById('savePwdBtn');
  setLoading(btn, true);
  try {
    await students.changePassword({ currentPassword: cur, newPassword: nw });
    toast('Password changed successfully!', 'success');
    e.target.reset();
  } catch (err) {
    toast(err.message || 'Failed to change password', 'error');
  } finally { setLoading(btn, false); }
});
</script>
</body>
</html>
