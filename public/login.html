<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTPT Portal – Login</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <h1>UTPT</h1>
      <p>University Training & Placement Tracker</p>
    </div>

    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label for="collegeId">College ID</label>
        <input type="text" id="collegeId" class="input" placeholder="e.g. 2021BTCS001" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-group">
          <input type="password" id="password" class="input" placeholder="Enter your password" required autocomplete="current-password">
          <button type="button" id="togglePassword" class="input-action">Show</button>
        </div>
        <p style="margin-top:.375rem;font-size:.78rem;color:var(--muted);">First time? Use your father's mobile number as password.</p>
      </div>
      <button type="submit" id="submitBtn" class="btn btn-primary btn-block" style="margin-top:.5rem;">Sign In</button>
    </form>
  </div>
</div>
<script type="module" src="/js/pages/login.js"></script>
</body>
</html>
