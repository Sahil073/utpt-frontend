<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTPT – Questions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<div id="page-loader">
  <div class="loader-logo">
    <div class="loader-icon">U</div>
    <div>
      <div class="loader-text"><span>U</span><span>T</span><span>P</span><span>T</span></div>
      <div class="loader-sub">Placement Tracker</div>
    </div>
  </div>
  <div class="loader-flower">
    <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div>
  </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
<button class="mobile-menu-btn" id="menuBtn" aria-label="Menu"><span></span><span></span><span></span></button>

<div class="app-shell">
  <nav class="sidebar" id="sidebar">
    <a class="sidebar-logo" href="/dashboard.html">
      <div class="sidebar-logo-icon">U</div>
      <div class="sidebar-logo-text">
        <div class="sidebar-logo-name">UTPT</div>
        <div class="sidebar-logo-sub">Portal</div>
      </div>
    </a>
    <div class="sidebar-nav">
      <a href="/dashboard.html" class="nav-item">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg></span>
        Dashboard
      </a>
      <a href="/leaderboard.html" class="nav-item">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6l4-4 4 4"/><path d="M12 2v10.3"/><path d="M4 13.5A7 7 0 0 0 12 20a7 7 0 0 0 8-6.5"/><path d="M5 17l-1 4h16l-1-4"/></svg></span>
        Leaderboard
      </a>
      <a href="/profile.html" class="nav-item">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></span>
        My Profile
      </a>
      <a href="/questions.html" class="nav-item active">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>
        Questions
      </a>
      <a href="/resources.html" class="nav-item">
        <span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>
        Resources
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="sidebarAvatar">?</div>
        <div class="sidebar-user-info">
          <span class="nav-user-name" id="navUserName">Loading…</span>
          <span class="nav-user-role">Student</span>
        </div>
      </div>
      <button id="logoutBtn" class="btn btn-ghost btn-sm w-full">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header fade-up">
      <div>
        <h1>Practice Questions</h1>
        <p class="page-header-sub">Company-wise curated question bank</p>
      </div>
    </div>

    <!-- Filters -->
    <div class="card mb-2 fade-up" style="animation-delay:.05s">
      <form id="filterForm" style="display:flex;flex-wrap:wrap;gap:.75rem;align-items:flex-end;">
        <div style="flex:1;min-width:140px;">
          <label style="font-size:.8125rem;font-weight:600;display:block;margin-bottom:.375rem;color:var(--text-2);">Difficulty</label>
          <select id="diffFilter" class="input">
            <option value="">All Levels</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>
        <div style="flex:2;min-width:160px;">
          <label style="font-size:.8125rem;font-weight:600;display:block;margin-bottom:.375rem;color:var(--text-2);">Topic</label>
          <input type="text" id="topicFilter" class="input" placeholder="e.g. arrays, dynamic programming">
        </div>
        <div style="display:flex;gap:.5rem;padding-bottom:.0625rem;">
          <button type="submit" class="btn btn-primary btn-sm">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="21" y1="4" x2="14" y2="4"/><line x1="10" y1="4" x2="3" y2="4"/><line x1="21" y1="12" x2="12" y2="12"/><line x1="8" y1="12" x2="3" y2="12"/><line x1="21" y1="20" x2="16" y2="20"/><line x1="12" y1="20" x2="3" y2="20"/><line x1="14" y1="2" x2="14" y2="6"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="16" y1="18" x2="16" y2="22"/></svg>
            Filter
          </button>
          <button type="reset" class="btn btn-ghost btn-sm">Reset</button>
        </div>
      </form>
    </div>

    <!-- Skeleton loading -->
    <div class="card fade-up" id="questionsSkeletonCard" style="animation-delay:.1s">
      <div style="display:flex;flex-direction:column;gap:.625rem;">
        <div class="skeleton" style="height:2.5rem;border-radius:.5rem;"></div>
        <div class="skeleton" style="height:2.5rem;border-radius:.5rem;opacity:.85;"></div>
        <div class="skeleton" style="height:2.5rem;border-radius:.5rem;opacity:.7;"></div>
        <div class="skeleton" style="height:2.5rem;border-radius:.5rem;opacity:.55;"></div>
        <div class="skeleton" style="height:2.5rem;border-radius:.5rem;opacity:.4;"></div>
        <div class="skeleton" style="height:2.5rem;border-radius:.5rem;opacity:.25;"></div>
      </div>
    </div>

    <div class="card fade-up" id="questionsRealCard" style="display:none;animation-delay:.1s">
      <div id="questionsSpinner" class="loading-row" style="display:none;"><div class="spinner"></div> Loading questions…</div>
      <div class="table-container"><div id="questionsTable"></div></div>
    </div>
  </main>
</div>

<script>
window.addEventListener('load', () => { setTimeout(() => { const l=document.getElementById('page-loader'); if(l) l.classList.add('hide'); }, 700); });
const menuBtn=document.getElementById('menuBtn'),sidebar=document.getElementById('sidebar'),overlay=document.getElementById('sidebarOverlay');
function toggleSidebar(){sidebar.classList.toggle('open');overlay.classList.toggle('show');}
menuBtn?.addEventListener('click',toggleSidebar);overlay?.addEventListener('click',toggleSidebar);
</script>
<script type="module">
  import { questions as questionsApi } from "/js/api.js";
  import { requireAuth, logout } from "/js/auth.js";
  import { toast, buildTable, $ } from "/js/utils.js";

  const user = await requireAuth();
  if (!user) throw new Error("Not authenticated");

  const navUserName = document.getElementById('navUserName');
  const sidebarAvatar = document.getElementById('sidebarAvatar');
  if (navUserName) navUserName.textContent = user.name;
  if (sidebarAvatar) sidebarAvatar.textContent = (user.name||'?')[0].toUpperCase();
  document.getElementById("logoutBtn").addEventListener("click", logout);

  const diffColors = { easy:"#059669", medium:"#d97706", hard:"#dc2626" };
  const diffBg = { easy:"#ecfdf5", medium:"#fffbeb", hard:"#fef2f2" };

  async function load(filter = {}) {
    const sp = $("#questionsSpinner");
    if (sp) sp.style.display = "";
    document.getElementById('questionsSkeletonCard').style.display = '';
    document.getElementById('questionsRealCard').style.display = 'none';
    try {
      const res = await questionsApi.list(filter);
      document.getElementById('questionsSkeletonCard').style.display = 'none';
      document.getElementById('questionsRealCard').style.display = '';
      if (sp) sp.style.display = "none";
      const items = (res.data && res.data.questions) ? res.data.questions : (Array.isArray(res.data) ? res.data : []);
      const rows = items.map(q => {
        const platformLink = q.platform_link || q.link || "";
        let platformName = "—";
        if (platformLink) {
          if (platformLink.includes("leetcode")) platformName = "LeetCode";
          else if (platformLink.includes("codeforces")) platformName = "Codeforces";
          else if (platformLink.includes("hackerrank")) platformName = "HackerRank";
          else if (platformLink.includes("geeksforgeeks") || platformLink.includes("gfg")) platformName = "GFG";
          else platformName = "External";
        }
        return [
          `<span style="font-weight:600;color:var(--text);">${q.title || "—"}</span>`,
          q.difficulty ? `<span style="background:${diffBg[q.difficulty]||"#f1f5f9"};color:${diffColors[q.difficulty]||"#475569"};padding:.2rem .625rem;border-radius:9999px;font-size:.75rem;font-weight:700;">${q.difficulty}</span>` : "—",
          (q.tags||[]).map(t=>`<span class="badge badge-purple">${t}</span>`).join(" ") || "—",
          platformLink ? `<span class="badge badge-muted">${platformName}</span>` : "—",
          platformLink ? `<a href="${platformLink}" target="_blank" class="btn btn-sm btn-outline">Solve →</a>` : "—",
        ];
      });
      $("#questionsTable").innerHTML = buildTable(["Title","Difficulty","Tags","Platform","Link"], rows, "No questions found");
    } catch (err) {
      document.getElementById('questionsSkeletonCard').style.display = 'none';
      document.getElementById('questionsRealCard').style.display = '';
      if (sp) sp.style.display = "none";
      toast(err.message, "error");
    }
  }

  $("#filterForm")?.addEventListener("submit", (e) => {
    e.preventDefault();
    const filter = {};
    const diff = $("#diffFilter")?.value;
    const topic = $("#topicFilter")?.value?.trim();
    if (diff) filter.difficulty = diff;
    if (topic) filter.tag = topic;
    load(filter);
  });

  load();
</script>
</body>
</html>
