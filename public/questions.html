<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTPT – Questions</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="app-shell">
  <nav class="sidebar">
    <div class="sidebar-logo">UTPT <span>Portal</span></div>
    <div class="sidebar-nav">
      <a href="/dashboard.html" class="nav-item"><span class="icon">🏠</span> Dashboard</a>
      <a href="/leaderboard.html" class="nav-item"><span class="icon">🏆</span> Leaderboard</a>
      <a href="/profile.html" class="nav-item"><span class="icon">👤</span> My Profile</a>
      <a href="/questions.html" class="nav-item active"><span class="icon">❓</span> Questions</a>
      <a href="/resources.html" class="nav-item"><span class="icon">📚</span> Resources</a>
    </div>
    <div class="sidebar-footer">
      <span class="nav-user-name">Loading…</span>
      <button id="logoutBtn" class="btn btn-outline btn-sm" style="margin-top:.5rem;width:100%;">Sign Out</button>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header"><h1>Practice Questions</h1></div>

    <div class="card" style="margin-bottom:1rem;">
      <form id="filterForm" style="display:flex;flex-wrap:wrap;gap:.75rem;align-items:flex-end;">
        <div style="flex:1;min-width:130px;">
          <label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.25rem;">Difficulty</label>
          <select id="diffFilter" class="input">
            <option value="">All</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </div>
        <div style="flex:1;min-width:130px;">
          <label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.25rem;">Topic</label>
          <input type="text" id="topicFilter" class="input" placeholder="e.g. arrays">
        </div>
        <button type="submit" class="btn btn-primary">Filter</button>
      </form>
    </div>

    <div class="card">
      <div id="questionsSpinner" class="loading-row"><div class="spinner"></div> Loading…</div>
      <div class="table-container"><div id="questionsTable"></div></div>
    </div>
  </main>
</div>
<script type="module">
  import { questions as questionsApi } from "/js/api.js";
  import { requireAuth, logout } from "/js/auth.js";
  import { toast, buildTable, $ } from "/js/utils.js";

  const user = await requireAuth();
  if (!user) throw new Error("Not authenticated");

  document.querySelector(".nav-user-name").textContent = user.name;
  document.getElementById("logoutBtn").addEventListener("click", logout);

  const diffColors = { easy:"#15803d", medium:"#a16207", hard:"#b91c1c" };

  async function load(filter = {}) {
    const sp = $("#questionsSpinner");
    if (sp) sp.style.display = "";
    try {
      const res = await questionsApi.list(filter);
      if (sp) sp.style.display = "none";
      const items = res.data || [];
      const rows = items.map(q => [
        q.title || "—",
        `<span style="color:${diffColors[q.difficulty]||"#666"};font-weight:600;">${q.difficulty||"—"}</span>`,
        (q.tags||[]).map(t=>`<span class="badge badge-info">${t}</span>`).join(" ") || "—",
        q.platform || "—",
        q.link ? `<a href="${q.link}" target="_blank" class="btn btn-sm btn-outline">Solve →</a>` : "—",
      ]);
      $("#questionsTable").innerHTML = buildTable(["Title","Difficulty","Tags","Platform","Link"], rows, "No questions found");
    } catch (err) {
      if (sp) sp.style.display = "none";
      toast(err.message, "error");
    }
  }

  $("#filterForm")?.addEventListener("submit", (e) => {
    e.preventDefault();
    const filter = {};
    const diff = $("#diffFilter")?.value;
    const topic = $("#topicFilter")?.value?.trim();
    if (diff)  filter.difficulty = diff;
    if (topic) filter.topic = topic;
    load(filter);
  });

  load();
</script>
</body>
</html>
