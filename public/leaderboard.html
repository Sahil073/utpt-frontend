<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTPT – Leaderboard</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="app-shell">
  <nav class="sidebar">
    <div class="sidebar-logo">UTPT <span>Portal</span></div>
    <div class="sidebar-nav">
      <a href="/dashboard.html" class="nav-item"><span class="icon">🏠</span> Dashboard</a>
      <a href="/leaderboard.html" class="nav-item active"><span class="icon">🏆</span> Leaderboard</a>
      <a href="/profile.html" class="nav-item"><span class="icon">👤</span> My Profile</a>
      <a href="/questions.html" class="nav-item"><span class="icon">❓</span> Questions</a>
      <a href="/resources.html" class="nav-item"><span class="icon">📚</span> Resources</a>
    </div>
    <div class="sidebar-footer">
      <span class="nav-user-name">Loading…</span>
      <button id="logoutBtn" class="btn btn-outline btn-sm" style="margin-top:.5rem;width:100%;">Sign Out</button>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h1>Leaderboard</h1>
      <div id="myRankDisplay" style="font-size:.875rem;color:var(--muted);"></div>
    </div>

    <!-- Filters -->
    <div class="card" style="margin-bottom:1.5rem;">
      <form id="filterForm" style="display:flex;flex-wrap:wrap;gap:.75rem;align-items:flex-end;">
        <div class="form-group" style="margin:0;flex:1;min-width:130px;">
          <label>Score Type</label>
          <select id="metricSelect" class="input">
            <option value="total">Total Score</option>
            <option value="academic">Academics</option>
            <option value="coding">Coding</option>
            <option value="dev">Development</option>
          </select>
        </div>
        <div class="form-group" style="margin:0;flex:1;min-width:130px;">
          <label>Batch</label>
          <input type="text" id="batchFilter" class="input" placeholder="e.g. 2021-25">
        </div>
        <div class="form-group" style="margin:0;flex:1;min-width:130px;">
          <label>Specialization</label>
          <input type="text" id="specFilter" class="input" placeholder="e.g. CSE">
        </div>
        <button type="submit" class="btn btn-primary">Apply Filter</button>
        <button type="button" class="btn btn-outline" onclick="document.getElementById('filterForm').reset();document.getElementById('filterForm').dispatchEvent(new Event('submit'))">Reset</button>
      </form>
    </div>

    <div class="card">
      <div id="lbSpinner" class="loading-row"><div class="spinner"></div> Loading leaderboard…</div>
      <div class="table-container">
        <div id="leaderboardTable"></div>
      </div>
      <div style="display:flex;justify-content:center;gap:.75rem;margin-top:1rem;">
        <button id="prevPage" class="btn btn-outline btn-sm">← Prev</button>
        <button id="nextPage" class="btn btn-outline btn-sm">Next →</button>
      </div>
    </div>
  </main>
</div>
<script type="module" src="/js/pages/leaderboard.js"></script>
</body>
</html>
