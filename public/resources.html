<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resources — UTPT</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .resource-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex; flex-direction: column; gap: 12px;
      box-shadow: var(--shadow-sm);
      transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
    }
    .resource-card:hover { border-color: #b8b8bf; box-shadow: var(--shadow); transform: translateY(-2px); }
    .resource-icon {
      width: 44px; height: 44px;
      background: var(--red-dim);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; flex-shrink: 0;
      border: 1px solid rgba(255,59,48,.15);
    }
    .resource-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  </style>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">U</div>
      <div><div class="brand-name">UTPT</div><div class="brand-sub">Placement Tracker</div></div>
    </div>
    <div class="sidebar-nav">
      <a href="/dashboard.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Dashboard</span></a>
      <a href="/leaderboard.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span>Leaderboard</span></a>
      <a href="/questions.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span>Questions</span></a>
      <a href="/resources.html" class="nav-item active"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>Resources</span></a>
      <a href="/profile.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Profile</span></a>
    </div>
    <div class="sidebar-footer">
      <a href="/profile.html" class="user-card" id="sidebar-user">
        <div class="user-avatar" id="sidebar-avatar">?</div>
        <div class="user-info"><div class="user-name" id="sidebar-name">Loading…</div><div class="user-role" id="sidebar-role">student</div></div>
      </a>
      <div class="sidebar-powered">Powered by <a href="https://arivana.site" target="_blank">arivana.site</a></div>
    </div>
  </nav>
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="btn btn-ghost btn-icon" id="sidebar-toggle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span style="font-weight:600;font-size:.9rem">Resources</span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" id="upload-btn" style="display:none">+ Upload PDF</button>
        <button class="btn btn-ghost btn-sm" id="logout-btn">Sign out</button>
      </div>
    </div>
    <div class="page-header">
      <div class="t-h1">Resources</div>
      <div class="page-subtitle">Study materials, notes, and placement guides</div>
    </div>
    <div class="page-body">
      <div class="flex gap-3 items-center" style="margin-bottom:20px;flex-wrap:wrap">
        <input type="text" class="form-input" id="r-batch" placeholder="Filter by batch…" style="width:160px">
        <input type="text" class="form-input" id="r-subject" placeholder="Filter by subject…" style="width:180px">
        <button class="btn btn-outline btn-sm" id="r-filter-btn">Apply</button>
        <button class="btn btn-ghost btn-sm" id="r-clear-btn">Clear</button>
      </div>
      <div class="resource-grid" id="resource-grid">
        <div class="page-loader"><div class="spinner"></div><span class="t-muted">Loading resources…</span></div>
      </div>
      <div id="r-pagination"></div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="upload-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Upload Resource</div>
      <button class="modal-close" data-modal-close>✕</button>
    </div>
    <form id="upload-form" enctype="multipart/form-data">
      <div class="form-group"><label class="form-label">Title *</label><input type="text" id="r-title" class="form-input" required></div>
      <div class="form-group"><label class="form-label">Description</label><input type="text" id="r-desc" class="form-input"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Batch *</label><input type="text" id="r-batch-field" class="form-input" required></div>
        <div class="form-group"><label class="form-label">Subject *</label><input type="text" id="r-subject-field" class="form-input" required></div>
      </div>
      <div class="form-group"><label class="form-label">PDF File *</label><input type="file" id="r-file" class="form-input" accept=".pdf" required style="padding:6px"></div>
      <div class="flex gap-3 justify-between mt-4">
        <button type="button" class="btn btn-outline" data-modal-close>Cancel</button>
        <button type="submit" class="btn btn-primary" id="r-upload-btn">Upload</button>
      </div>
    </form>
  </div>
</div>
<div id="toast-container"></div>
<div class="powered-footer">Powered by <a href="https://arivana.site" target="_blank">arivana.site</a></div>
<script type="module" src="/js/pages/resources.js"></script>
</body>
</html>
