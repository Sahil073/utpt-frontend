<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTPT – Resources</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="app-shell">
  <nav class="sidebar">
    <div class="sidebar-logo">UTPT <span>Portal</span></div>
    <div class="sidebar-nav">
      <a href="/dashboard.html" class="nav-item"><span class="icon">🏠</span> Dashboard</a>
      <a href="/leaderboard.html" class="nav-item"><span class="icon">🏆</span> Leaderboard</a>
      <a href="/profile.html" class="nav-item"><span class="icon">👤</span> My Profile</a>
      <a href="/questions.html" class="nav-item"><span class="icon">❓</span> Questions</a>
      <a href="/resources.html" class="nav-item active"><span class="icon">📚</span> Resources</a>
    </div>
    <div class="sidebar-footer">
      <span class="nav-user-name">Loading…</span>
      <button id="logoutBtn" class="btn btn-outline btn-sm" style="margin-top:.5rem;width:100%;">Sign Out</button>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header"><h1>Learning Resources</h1></div>

    <div class="card" style="margin-bottom:1rem;">
      <form id="filterForm" style="display:flex;flex-wrap:wrap;gap:.75rem;align-items:flex-end;">
        <div style="flex:1;min-width:130px;">
          <label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.25rem;">Category</label>
          <input type="text" id="catFilter" class="input" placeholder="e.g. DSA, System Design">
        </div>
        <div style="flex:1;min-width:130px;">
          <label style="font-size:.8rem;font-weight:600;display:block;margin-bottom:.25rem;">Type</label>
          <select id="typeFilter" class="input">
            <option value="">All Types</option>
            <option value="video">Video</option>
            <option value="article">Article</option>
            <option value="book">Book</option>
            <option value="course">Course</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">Filter</button>
      </form>
    </div>

    <div id="resourcesGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;">
      <div class="loading-row" style="grid-column:1/-1;"><div class="spinner"></div> Loading…</div>
    </div>
  </main>
</div>
<script type="module">
  import { resources as resourcesApi } from "/js/api.js";
  import { requireAuth, logout } from "/js/auth.js";
  import { toast, $ } from "/js/utils.js";

  const user = await requireAuth();
  if (!user) throw new Error("Not authenticated");

  document.querySelector(".nav-user-name").textContent = user.name;
  document.getElementById("logoutBtn").addEventListener("click", logout);

  const typeIcons = { video:"🎥", article:"📄", book:"📖", course:"🎓" };

  async function load(filter = {}) {
    const grid = document.getElementById("resourcesGrid");
    grid.innerHTML = `<div class="loading-row" style="grid-column:1/-1;"><div class="spinner"></div> Loading…</div>`;
    try {
      const res = await resourcesApi.list(filter);
      const items = res.data || [];
      if (!items.length) {
        grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:var(--muted);padding:3rem;">No resources found</p>`;
        return;
      }
      grid.innerHTML = items.map(r => `
        <div class="card" style="padding:1.25rem;">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.75rem;">
            <span style="font-size:1.5rem;">${typeIcons[r.type]||"📌"}</span>
            <span class="badge badge-info">${r.type||"—"}</span>
          </div>
          <h3 style="font-size:.95rem;margin:0 0 .4rem;line-height:1.4;">${r.title||"Untitled"}</h3>
          <p style="font-size:.8rem;color:var(--muted);margin:0 0 .75rem;line-height:1.5;">${r.description||""}</p>
          ${r.tags?.length ? `<div style="display:flex;flex-wrap:wrap;gap:.25rem;margin-bottom:.75rem;">${r.tags.map(t=>`<span class="badge badge-purple">${t}</span>`).join("")}</div>` : ""}
          ${r.url ? `<a href="${r.url}" target="_blank" class="btn btn-primary btn-sm">Open Resource →</a>` : ""}
        </div>`).join("");
    } catch (err) {
      grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:var(--danger);padding:3rem;">${err.message}</p>`;
    }
  }

  $("#filterForm")?.addEventListener("submit", (e) => {
    e.preventDefault();
    const filter = {};
    const cat  = document.getElementById("catFilter")?.value?.trim();
    const type = document.getElementById("typeFilter")?.value;
    if (cat)  filter.category = cat;
    if (type) filter.type = type;
    load(filter);
  });

  load();
</script>
</body>
</html>
