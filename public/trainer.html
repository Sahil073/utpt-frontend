<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTPT – Trainer</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="app-shell">
  <nav class="sidebar">
    <div class="sidebar-logo">UTPT <span>Trainer</span></div>
    <div class="sidebar-nav">
      <button class="nav-item active tab-btn" data-tab="tabDashboard"><span class="icon">📊</span> Dashboard</button>
      <button class="nav-item tab-btn" data-tab="tabStudents"><span class="icon">👥</span> Students</button>
      <button class="nav-item tab-btn" data-tab="tabPoor"><span class="icon">⚠️</span> Poor Performers</button>
      <a href="/leaderboard.html" class="nav-item"><span class="icon">🏆</span> Leaderboard</a>
    </div>
    <div class="sidebar-footer">
      <span class="nav-user-name">Loading…</span>
      <button id="logoutBtn" class="btn btn-outline btn-sm" style="margin-top:.5rem;width:100%;">Sign Out</button>
    </div>
  </nav>

  <main class="main-content">

    <!-- Dashboard -->
    <div id="tabDashboard" class="tab-pane">
      <div class="page-header"><h1>Trainer Dashboard</h1></div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-value" id="totalStudents">—</div><div class="stat-label">Total Students</div></div>
        <div class="stat-card"><div class="stat-value" id="activeToday">—</div><div class="stat-label">Active Today</div></div>
        <div class="stat-card"><div class="stat-value" id="avgScore">—</div><div class="stat-label">Avg Score</div></div>
      </div>
    </div>

    <!-- Students -->
    <div id="tabStudents" class="tab-pane" style="display:none;">
      <div class="page-header"><h1>Students</h1></div>
      <div class="card" style="margin-bottom:1rem;">
        <form id="searchForm" style="display:flex;gap:.75rem;">
          <input type="text" id="searchQuery" class="input" placeholder="Search name, college ID…" style="flex:1;">
          <button type="submit" class="btn btn-primary">Search</button>
        </form>
      </div>
      <div class="card">
        <div class="table-container"><div id="studentsTable"><div class="loading-row"><div class="spinner"></div> Loading…</div></div></div>
      </div>
    </div>

    <!-- Poor Performers -->
    <div id="tabPoor" class="tab-pane" style="display:none;">
      <div class="page-header"><h1>Poor Performers</h1><p style="color:var(--muted);font-size:.85rem;">Students with no activity in last 7 days</p></div>
      <div class="card">
        <div class="table-container"><div id="poorPerfTable"><div class="loading-row"><div class="spinner"></div> Loading…</div></div></div>
      </div>
    </div>

  </main>
</div>
<script type="module" src="/js/pages/trainer.js"></script>
</body>
</html>
