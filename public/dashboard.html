<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UTPT – Redirecting…</title>
</head>
<body>
<script>
  try {
    const user = JSON.parse(localStorage.getItem('utpt_user') || 'null');
    const role = user && user.role;
    if (role === 'admin')        location.replace('/admin-dashboard.html');
    else if (role === 'trainer') location.replace('/trainer-dashboard.html');
    else if (role === 'student') location.replace('/student-dashboard.html');
    else                         location.replace('/login.html');
  } catch(e) { location.replace('/login.html'); }
</script>
</body>
</html>
