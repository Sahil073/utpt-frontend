<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTPT – Dashboard</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="app-shell">
  <nav class="sidebar">
    <div class="sidebar-logo">UTPT <span>Portal</span></div>
    <div class="sidebar-nav">
      <a href="/dashboard.html" class="nav-item active"><span class="icon">🏠</span> Dashboard</a>
      <a href="/leaderboard.html" class="nav-item"><span class="icon">🏆</span> Leaderboard</a>
      <a href="/profile.html" class="nav-item"><span class="icon">👤</span> My Profile</a>
      <a href="/questions.html" class="nav-item"><span class="icon">❓</span> Questions</a>
      <a href="/resources.html" class="nav-item"><span class="icon">📚</span> Resources</a>
    </div>
    <div class="sidebar-footer">
      <span class="nav-user-name">Loading…</span>
      <button id="logoutBtn" class="btn btn-outline btn-sm" style="margin-top:.5rem;width:100%;">Sign Out</button>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h1>Dashboard</h1>
      <div style="display:flex;gap:.5rem;">
        <button id="syncCodingBtn" class="btn btn-outline btn-sm">Sync Coding</button>
        <button id="syncGitHubBtn" class="btn btn-outline btn-sm">Sync GitHub</button>
        <button id="changePwdBtn" class="btn btn-sm" style="background:var(--bg);border:1px solid var(--border);">Change Password</button>
      </div>
    </div>

    <!-- Stats grid -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="totalScore">—</div>
        <div class="stat-label">Total UTPT Score</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="myRank">—</div>
        <div class="stat-label">Your Rank</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="lcSolved">—</div>
        <div class="stat-label">LeetCode Solved</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="cfRating">—</div>
        <div class="stat-label">Codeforces Rating</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="ghCommits">—</div>
        <div class="stat-label">GitHub Commits</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="myRankScore">—</div>
        <div class="stat-label">Rank Score</div>
      </div>
    </div>

    <div class="grid-2">
      <!-- Profile card -->
      <div class="card">
        <div class="card-title">Your Profile</div>
        <div id="profileCard"><div class="loading-row"><div class="spinner"></div> Loading…</div></div>
      </div>

      <!-- Score breakdown -->
      <div class="card">
        <div class="card-title">Score Breakdown</div>
        <div style="margin-bottom:1rem;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;">
            <span style="font-size:.85rem;color:var(--muted);">Academics (30%)</span>
            <span id="acadScore" style="font-weight:700;">—</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;">
            <span style="font-size:.85rem;color:var(--muted);">Coding (50%)</span>
            <span id="codingScore" style="font-weight:700;">—</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:.85rem;color:var(--muted);">Development (20%)</span>
            <span id="devScore" style="font-weight:700;">—</span>
          </div>
        </div>
        <div id="scoreBreakdown"></div>
      </div>
    </div>
  </main>
</div>
<script type="module" src="/js/pages/dashboard.js"></script>
</body>
</html>
