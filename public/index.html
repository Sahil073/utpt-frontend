<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTPT Portal</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<script type="module">
  import { loadSession, getUser, redirectByRole } from "/js/auth.js";
  import { auth as authApi } from "/js/api.js";

  loadSession();
  const user = getUser();
  const token = sessionStorage.getItem("accessToken");

  if (user && token) {
    redirectByRole(user.role);
  } else {
    const ok = await authApi.refresh();
    if (ok) {
      const u = getUser();
      if (u) redirectByRole(u.role);
      else window.location.href = "/login.html";
    } else {
      window.location.href = "/login.html";
    }
  }
</script>
<div class="flex-center" style="min-height:100vh;">
  <div class="spinner"></div>
</div>
</body>
</html>
