<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTPT Admin – Questions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<div id="page-loader">
  <div class="loader-logo"><div class="loader-icon">U</div><div><div class="loader-text"><span>U</span><span>T</span><span>P</span><span>T</span></div><div class="loader-sub">Admin Panel</div></div></div>
  <div class="loader-flower"><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div><div class="petal"></div></div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
<button class="mobile-menu-btn" id="menuBtn" aria-label="Menu"><span></span><span></span><span></span></button>

<div class="app-shell">
  <nav class="sidebar" id="sidebar">
    <a class="sidebar-logo" href="/admin-dashboard.html"><div class="sidebar-logo-icon">U</div><div class="sidebar-logo-text"><div class="sidebar-logo-name">UTPT</div><div class="sidebar-logo-sub">Admin</div></div></a>
    <div class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="/admin-dashboard.html" class="nav-item"><span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg></span>Dashboard</a>
      <div class="nav-section-label">Content</div>
      <a href="/admin-resources.html" class="nav-item"><span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>Resources</a>
      <a href="/admin-questions.html" class="nav-item active"><span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>Questions</a>
      <a href="/admin-leaderboard.html" class="nav-item"><span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6l4-4 4 4"/><path d="M12 2v10.3"/><path d="M4 13.5A7 7 0 0 0 12 20a7 7 0 0 0 8-6.5"/><path d="M5 17l-1 4h16l-1-4"/></svg></span>Leaderboard</a>
      <a href="/admin-profile.html" class="nav-item"><span class="icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></span>My Profile</a>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-user"><div class="sidebar-user-avatar" id="sidebarAvatar">A</div><div class="sidebar-user-info"><span class="nav-user-name" id="navUserName">Loading…</span><span class="nav-user-role">Admin</span></div></div>
      <button id="logoutBtn" class="btn btn-ghost btn-sm w-full"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button>
    </div>
  </nav>

  <main class="main-content">
    <div class="page-header fade-up">
      <div><h1>Questions</h1><p class="page-header-sub">Create, edit, and delete practice questions</p></div>
      <button id="addQuestionBtn" class="btn btn-primary"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Question</button>
    </div>

    <div class="card mb-2 fade-up" style="animation-delay:.05s">
      <form id="filterForm" style="display:flex;flex-wrap:wrap;gap:.75rem;align-items:flex-end;">
        <div style="flex:1;min-width:140px;"><label style="font-size:.8125rem;font-weight:600;display:block;margin-bottom:.375rem;color:var(--text-2);">Difficulty</label>
          <select id="diffFilter" class="input"><option value="">All</option><option value="easy">Easy</option><option value="medium">Medium</option><option value="hard">Hard</option></select>
        </div>
        <div style="flex:2;min-width:160px;"><label style="font-size:.8125rem;font-weight:600;display:block;margin-bottom:.375rem;color:var(--text-2);">Tag</label><input type="text" id="tagFilter" class="input" placeholder="e.g. arrays, dp"></div>
        <div style="display:flex;gap:.5rem;padding-bottom:.0625rem;">
          <button type="submit" class="btn btn-primary btn-sm">Filter</button>
          <button type="reset" class="btn btn-ghost btn-sm">Reset</button>
        </div>
      </form>
    </div>

    <div class="card fade-up" id="questionsSkeleton" style="animation-delay:.1s;">
      <div style="display:flex;flex-direction:column;gap:.625rem;">
        <div class="skeleton" style="height:2.5rem;border-radius:.5rem;"></div>
        <div class="skeleton" style="height:2.5rem;border-radius:.5rem;opacity:.85;"></div>
        <div class="skeleton" style="height:2.5rem;border-radius:.5rem;opacity:.7;"></div>
        <div class="skeleton" style="height:2.5rem;border-radius:.5rem;opacity:.55;"></div>
      </div>
    </div>
    <div class="card fade-up" id="questionsCard" style="display:none;animation-delay:.1s;">
      <div id="questionsTable"></div>
    </div>
  </main>
</div>

<script>
window.addEventListener('load', () => { setTimeout(() => { const l=document.getElementById('page-loader'); if(l) l.classList.add('hide'); }, 700); });
const menuBtn=document.getElementById('menuBtn'),sidebar=document.getElementById('sidebar'),overlay=document.getElementById('sidebarOverlay');
function toggleSidebar(){sidebar.classList.toggle('open');overlay.classList.toggle('show');}
menuBtn?.addEventListener('click',toggleSidebar);overlay?.addEventListener('click',toggleSidebar);
</script>
<script type="module">
import { questions as questionsApi } from "/js/api.js";
import { requireAuth, logout } from "/js/auth.js";
import { toast, buildTable, setLoading } from "/js/utils.js";

const user = await requireAuth(["admin"]);
if (!user) throw new Error("Not authenticated");

document.getElementById('navUserName').textContent = user.name;
document.getElementById('sidebarAvatar').textContent = (user.name||'A')[0].toUpperCase();
document.getElementById('logoutBtn').addEventListener('click', logout);

const diffColors = { easy:"#059669", medium:"#d97706", hard:"#dc2626" };
const diffBg     = { easy:"#ecfdf5", medium:"#fffbeb", hard:"#fef2f2" };
let currentFilter = {};
let allItems = [];

async function load(filter = {}) {
  currentFilter = filter;
  document.getElementById('questionsSkeleton').style.display = '';
  document.getElementById('questionsCard').style.display = 'none';
  try {
    const res = await questionsApi.list(filter);
    allItems = res.data?.questions ?? (Array.isArray(res.data) ? res.data : []);
    document.getElementById('questionsSkeleton').style.display = 'none';
    document.getElementById('questionsCard').style.display = '';
    renderTable(allItems);
  } catch (err) {
    document.getElementById('questionsSkeleton').style.display = 'none';
    document.getElementById('questionsCard').style.display = '';
    toast(err.message, 'error');
  }
}

function renderTable(items) {
  const rows = items.map(q => {
    const link = q.platform_link || q.link || '';
    return [
      `<span style="font-weight:600;color:var(--text);">${q.title||'—'}</span>`,
      q.difficulty ? `<span style="background:${diffBg[q.difficulty]||'#f1f5f9'};color:${diffColors[q.difficulty]||'#475569'};padding:.2rem .625rem;border-radius:9999px;font-size:.75rem;font-weight:700;">${q.difficulty}</span>` : '—',
      (q.tags||[]).map(t=>`<span class="badge badge-purple">${t}</span>`).join(' ') || '—',
      link ? `<a href="${link}" target="_blank" class="btn btn-sm btn-outline">Open →</a>` : '—',
      `<div style="display:flex;gap:.375rem;">
        <button class="btn btn-sm btn-ghost" onclick="window._editQuestion('${q.id}')">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="window._deleteQuestion('${q.id}','${(q.title||'').replace(/'/g,"\\'")}')">Delete</button>
      </div>`,
    ];
  });
  document.getElementById('questionsTable').innerHTML = buildTable(
    ['Title','Difficulty','Tags','Link','Actions'], rows, 'No questions found'
  );
}

window._deleteQuestion = async (id, title) => {
  if (!confirm(`Delete "${title}"?`)) return;
  try {
    await questionsApi.remove(id);
    toast('Question deleted', 'success');
    load(currentFilter);
  } catch (err) { toast(err.message, 'error'); }
};

window._editQuestion = id => {
  const q = allItems.find(x => x.id === id);
  if (!q) return;
  showQuestionModal(q);
};

document.getElementById('addQuestionBtn').addEventListener('click', () => showQuestionModal());

function showQuestionModal(q = null) {
  let modal = document.getElementById('qModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'qModal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(15,7,32,.7);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;overflow-y:auto;';
    document.body.appendChild(modal);
    modal.addEventListener('click', e => { if (e.target === modal) modal.style.display = 'none'; });
  }
  modal.innerHTML = `
    <div style="background:#fff;border-radius:1.25rem;padding:2rem;width:100%;max-width:520px;box-shadow:0 32px 80px rgba(0,0,0,.3);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
        <h3 style="margin:0;font-weight:800;">${q ? 'Edit' : 'Add'} Question</h3>
        <button onclick="document.getElementById('qModal').style.display='none'" class="btn btn-ghost btn-sm">✕</button>
      </div>
      <form id="qForm">
        <div class="form-group"><label>Title *</label><input type="text" id="qTitle" class="input" required value="${q?.title||''}"></div>
        <div class="form-group"><label>Difficulty</label>
          <select id="qDiff" class="input">
            <option value="easy" ${q?.difficulty==='easy'?'selected':''}>Easy</option>
            <option value="medium" ${q?.difficulty==='medium'?'selected':''}>Medium</option>
            <option value="hard" ${q?.difficulty==='hard'?'selected':''}>Hard</option>
          </select>
        </div>
        <div class="form-group"><label>Tags <span style="font-weight:400;font-size:.75rem;color:var(--muted);">(comma-separated)</span></label><input type="text" id="qTags" class="input" placeholder="arrays, dp, greedy" value="${(q?.tags||[]).join(', ')}"></div>
        <div class="form-group"><label>Platform Link</label><input type="url" id="qLink" class="input" placeholder="https://leetcode.com/problems/…" value="${q?.platform_link||q?.link||''}"></div>
        <div class="form-group"><label>Company <span style="font-weight:400;font-size:.75rem;color:var(--muted);">(optional)</span></label><input type="text" id="qCompany" class="input" placeholder="e.g. Google" value="${q?.company||''}"></div>
        <div style="display:flex;gap:.75rem;margin-top:.5rem;">
          <button type="submit" id="saveQBtn" class="btn btn-primary" style="flex:1;">${q ? 'Save Changes' : 'Add Question'}</button>
          <button type="button" class="btn btn-ghost" onclick="document.getElementById('qModal').style.display='none'">Cancel</button>
        </div>
      </form>
    </div>`;
  modal.style.display = 'flex';

  document.getElementById('qForm').addEventListener('submit', async e => {
    e.preventDefault();
    const body = {
      title:         document.getElementById('qTitle').value.trim(),
      difficulty:    document.getElementById('qDiff').value,
      tags:          document.getElementById('qTags').value.split(',').map(t=>t.trim()).filter(Boolean),
      platform_link: document.getElementById('qLink').value.trim() || undefined,
      company:       document.getElementById('qCompany').value.trim() || undefined,
    };
    const btn = document.getElementById('saveQBtn');
    setLoading(btn, true);
    try {
      if (q) {
        await questionsApi.update(q.id, body);
        toast('Question updated!', 'success');
      } else {
        await questionsApi.create(body);
        toast('Question added!', 'success');
      }
      modal.style.display = 'none';
      load(currentFilter);
    } catch (err) {
      toast(err.message || 'Failed to save question', 'error');
    } finally { setLoading(btn, false); }
  });
}

document.getElementById('filterForm').addEventListener('submit', e => {
  e.preventDefault();
  const filter = {};
  const diff = document.getElementById('diffFilter').value;
  const tag = document.getElementById('tagFilter').value.trim();
  if (diff) filter.difficulty = diff;
  if (tag) filter.tag = tag;
  load(filter);
});
document.getElementById('filterForm').addEventListener('reset', () => setTimeout(() => load(), 50));

load();
</script>
</body>
</html>
