<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — UTPT</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .lb-podium { display: flex; align-items: flex-end; justify-content: center; gap: 12px; margin-bottom: 32px; }
    .podium-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .podium-block {
      width: 80px; border-radius: var(--radius) var(--radius) 0 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; font-weight: 800; color: #fff;
    }
    .podium-1 { height: 80px; background: linear-gradient(180deg, #b8860b, #ffd700); }
    .podium-2 { height: 60px; background: linear-gradient(180deg, #888, #c0c0c0); }
    .podium-3 { height: 48px; background: linear-gradient(180deg, #8b4513, #cd7f32); }
    .podium-name { font-size: .8rem; font-weight: 600; text-align: center; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .podium-score { font-size: .72rem; color: var(--text-muted); }
    .my-rank-bar {
      background: linear-gradient(90deg, rgba(47,129,247,.12), var(--bg-2));
      border: 1px solid rgba(47,129,247,.3);
      border-radius: var(--radius);
      padding: 16px 20px;
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 20px;
    }
    .my-rank-num { font-size: 1.8rem; font-weight: 800; color: var(--blue); }
  </style>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">U</div>
      <div><div class="brand-name">UTPT</div><div class="brand-sub">Placement Tracker</div></div>
    </div>
    <div class="sidebar-nav">
      <a href="/dashboard.html" class="nav-item" data-page="dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="/leaderboard.html" class="nav-item active" data-page="leaderboard">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Leaderboard</span>
      </a>
      <a href="/questions.html" class="nav-item" data-page="questions">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span>Questions</span>
      </a>
      <a href="/resources.html" class="nav-item" data-page="resources">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span>Resources</span>
      </a>
      <a href="/profile.html" class="nav-item" data-page="profile">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profile</span>
      </a>
    </div>
    <div class="sidebar-footer">
      <a href="/profile.html" class="user-card" id="sidebar-user">
        <div class="user-avatar" id="sidebar-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="sidebar-name">Loading…</div>
          <div class="user-role" id="sidebar-role">student</div>
        </div>
      </a>
      <div class="sidebar-powered">Powered by <a href="https://arivana.site" target="_blank">arivana.site</a></div>
    </div>
  </nav>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="btn btn-ghost btn-icon" id="sidebar-toggle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span style="font-weight:600;font-size:.9rem">Leaderboard</span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-ghost btn-sm" id="logout-btn">Sign out</button>
      </div>
    </div>

    <div class="page-header">
      <div class="t-h1">Leaderboard</div>
      <div class="page-subtitle">Rankings across all coding platforms</div>
    </div>

    <div class="page-body">
      <!-- My Rank -->
      <div class="my-rank-bar" id="my-rank-bar" style="display:none">
        <div>
          <div style="font-size:.72rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">Your Rank</div>
          <div class="my-rank-num" id="my-rank-num">—</div>
        </div>
        <div style="flex:1">
          <div style="font-size:.85rem;font-weight:600" id="my-rank-name">—</div>
          <div style="font-size:.78rem;color:var(--text-muted)" id="my-rank-score">Score: —</div>
        </div>
        <a href="/profile.html" class="btn btn-outline btn-sm">View Profile</a>
      </div>

      <!-- Filters -->
      <div class="flex gap-3 items-center" style="margin-bottom:20px;flex-wrap:wrap">
        <div class="tabs" style="border:none;margin-bottom:0">
          <button class="tab-btn active" data-scope="global">Global</button>
          <button class="tab-btn" data-scope="batch">Batch</button>
          <button class="tab-btn" data-scope="spec">Specialization</button>
        </div>
        <div id="filter-extra" style="display:flex;gap:8px;flex-wrap:wrap"></div>
      </div>

      <!-- Podium (top 3) -->
      <div class="lb-podium" id="lb-podium"></div>

      <!-- Table -->
      <div class="card" style="padding:0;overflow:hidden">
        <div class="table-wrap" style="border:none">
          <table>
            <thead>
              <tr>
                <th style="width:60px">Rank</th>
                <th>Student</th>
                <th>Batch</th>
                <th>Spec</th>
                <th>LeetCode</th>
                <th>Codeforces</th>
                <th>GitHub</th>
                <th style="text-align:right">Score</th>
              </tr>
            </thead>
            <tbody id="lb-tbody">
              <tr><td colspan="8"><div class="page-loader"><div class="spinner"></div></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <div id="lb-pagination"></div>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script type="module" src="/js/pages/leaderboard.js"></script>
</body>
</html>
