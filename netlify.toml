[build]
  publish = "."

# Proxy all /api/* calls to your Render backend
# Replace YOUR_RENDER_URL with your actual Render service URL
# e.g. https://utpt-backend.onrender.com
[[redirects]]
  from   = "/api/*"
  to     = "https://utpt-backend.onrender.com/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/health"
  to     = "https://utpt-backend.onrender.com/health"
  status = 200
  force  = true
