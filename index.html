<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTPT — Placement Tracker</title>
  <script>
    const user  = (() => { try { return JSON.parse(localStorage.getItem('utpt_user')||'null'); } catch { return null; } })();
    const token = localStorage.getItem('utpt_token');
    if (user && token) {
      window.location.href = (user.role === 'admin' || user.role === 'trainer') ? '/admin.html' : '/dashboard.html';
    } else {
      window.location.href = '/login.html';
    }
  </script>
</head>
<body></body>
</html>
